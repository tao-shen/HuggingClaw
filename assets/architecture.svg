<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#1a0800"/>
    </linearGradient>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4ade80"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="280" rx="12" fill="url(#bg)"/>

  <!-- ═══════════════════════════════ -->
  <!-- OPENCLAW ENGINE (red, top)     -->
  <!-- ═══════════════════════════════ -->
  <rect x="150" y="20" width="300" height="80" rx="12" fill="#1a0505" stroke="#ef0011" stroke-width="1.8"/>
  <rect x="160" y="20" width="280" height="3" rx="1.5" fill="#ef0011" opacity="0.5"/>
  <text x="300" y="52" text-anchor="middle" fill="#ef0011" font-size="18" font-weight="700">OpenClaw</text>
  <text x="300" y="72" text-anchor="middle" fill="#8b3030" font-size="10">AI Assistant Engine · Node.js</text>
  <text x="300" y="88" text-anchor="middle" fill="#5a2020" font-size="9">Conversations · Plugins · Agents · Memory</text>

  <!-- Arrows down -->
  <line x1="210" y1="100" x2="210" y2="140" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowY)" filter="url(#glow)"/>
  <text x="195" y="125" text-anchor="end" fill="#a3842c" font-size="8">runs on</text>

  <line x1="390" y1="100" x2="390" y2="140" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowG)" filter="url(#glow)"/>
  <text x="405" y="125" fill="#4ade80" font-size="8" opacity="0.7">syncs to</text>

  <!-- ═══════════════════════════════ -->
  <!-- HF SPACE (yellow, bottom left) -->
  <!-- ═══════════════════════════════ -->
  <rect x="30" y="148" width="260" height="90" rx="12" fill="#1a1200" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="40" y="148" width="240" height="3" rx="1.5" fill="#fbbf24" opacity="0.4"/>

  <circle cx="60" cy="175" r="10" fill="#fbbf24" opacity="0.15"/>
  <text x="60" y="179" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="800">HF</text>
  <text x="82" y="175" fill="#fbbf24" font-size="14" font-weight="700">HuggingFace Space</text>
  <text x="82" y="193" fill="#a3842c" font-size="9">Docker Container · Free CPU Tier</text>

  <text x="60" y="220" fill="#8b7020" font-size="8">2 vCPU · 16 GB RAM · HTTPS · Always Online</text>

  <!-- ═══════════════════════════════════ -->
  <!-- HF DATASET (yellow, bottom right)  -->
  <!-- ═══════════════════════════════════ -->
  <rect x="310" y="148" width="260" height="90" rx="12" fill="#1a1200" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="320" y="148" width="240" height="3" rx="1.5" fill="#fbbf24" opacity="0.4"/>

  <circle cx="340" cy="175" r="10" fill="#fbbf24" opacity="0.15"/>
  <text x="340" y="179" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="800">HF</text>
  <text x="362" y="175" fill="#fbbf24" font-size="14" font-weight="700">HF Dataset</text>
  <text x="362" y="193" fill="#a3842c" font-size="9">Private Repo · Auto-Sync</text>

  <text x="340" y="220" fill="#8b7020" font-size="8">Settings · Credentials · Conversations</text>

  <!-- Bidirectional hint -->
  <line x1="290" y1="193" x2="310" y2="193" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Footer -->
  <text x="300" y="268" text-anchor="middle" fill="#5c3c10" font-size="8" letter-spacing="1.5">ZERO HARDWARE · ALWAYS ONLINE · AUTO-PERSISTENT · ONE-CLICK DEPLOY</text>
</svg>
